    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-bg: rgba(255, 255, 255, 0.7);
            --user-bubble: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --user-text: #ffffff;
            --agent-bubble: #ffffff;
            --agent-text: #1e293b;
            --system-text: #94a3b8;
            --accent-color: #6366f1;
            --border-radius: 20px;
            --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--agent-text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        aside {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(226, 232, 240, 0.8);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: var(--user-bubble);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .meta-item {
            font-size: 0.8125rem;
            color: var(--system-text);
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .meta-label {
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.5rem;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
        }

        .chat-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .message {
            max-width: 80%;
            padding: 1.5rem 1.75rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
            font-size: 0.9375rem;
            line-height: 1.7;
            position: relative;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--agent-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .message.system {
            align-self: center;
            max-width: 90%;
            background: rgba(226, 232, 240, 0.3);
            box-shadow: none;
            color: var(--system-text);
            font-size: 0.75rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
        }

        .message:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Content Styling */
        .content pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1.25rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            line-height: 1.5;
        }

        .content table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .content th {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            font-weight: 600;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .content td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .content tr:last-child td {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* Custom Table for ASCII charts */
        .ascii-table {
            background: #0f172a;
            color: #38bdf8;
            padding: 1.5rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre;
            overflow-x: auto;
            font-size: 0.75rem;
            margin: 1rem -0.5rem;
            border: 1px solid #1e293b;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

    <script>
        function parseTUI(text) {
            const lines = text.split('\n');
            const messages = [];
            let currentSender = 'agent';
            let currentMessageLines = [];

            const isUserLine = (l) => {
                const u = l.trim();
                return ['你好', '开始采集', '停止采集', '尝试读取一些最新的数据'].includes(u);
            };

            const isSystemLine = (l) => {
                return l.includes('openclaw tui') ||
                    l.includes('session agent') ||
                    l.includes('Pre-compaction memory flush') ||
                    l.includes('NO_REPLY') ||
                    l.includes('connected |') ||
                    l.includes('agent main |');
            };

            lines.forEach((line, i) => {
                const trimmed = line.trim();

                if (isSystemLine(line)) {
                    if (currentMessageLines.length) {
                        messages.push({ sender: currentSender, content: currentMessageLines.join('\n') });
                        currentMessageLines = [];
                    }
                    messages.push({ sender: 'system', content: trimmed });
                    return;
                }

                if (isUserLine(line)) {
                    if (currentMessageLines.length) {
                        messages.push({ sender: currentSender, content: currentMessageLines.join('\n') });
                        currentMessageLines = [];
                    }
                    messages.push({ sender: 'user', content: trimmed });
                    currentSender = 'agent';
                    return;
                }

                if (trimmed || line === '') {
                    currentMessageLines.push(line);
                }
            });

            if (currentMessageLines.length) {
                messages.push({ sender: currentSender, content: currentMessageLines.join('\n') });
            }

            return messages;
        }

        function render() {
            const container = document.getElementById('chat-container');
            const text = document.getElementById('md-content').textContent;

            const messages = parseTUI(text);
            messages.forEach((msg, idx) => {
                const content = msg.content.trim();
                if (!content) return;

                const div = document.createElement('div');
                div.className = `message ${msg.sender}`;
                div.style.animationDelay = `${idx * 0.1}s`;

                if (msg.sender === 'system') {
                    div.textContent = content;
                    if (content.includes('agent main |')) {
                        updateSidebar(content);
                    }
                } else {
                    if (content.includes('┌') || content.includes('├') || content.includes('│')) {
                        const parts = content.split(/(┌[\s\S]+?┘)/);
                        div.innerHTML = parts.map(p => {
                            if (p.includes('┌')) {
                                return `<div class="ascii-table">${p.trim()}</div>`;
                            }
                            return `<div class="content">${marked.parse(p)}</div>`;
                        }).join('');
                    } else {
                        div.innerHTML = `<div class="content">${marked.parse(content)}</div>`;
                    }
                }
                container.appendChild(div);
            });
        }

        function updateSidebar(text) {
            const sidebar = document.getElementById('sidebar-meta');
            const parts = text.split('|').map(p => p.trim());
            sidebar.innerHTML = `
                <div class="meta-item">
                    <span class="meta-label">Session Name</span>
                    minimax_final
                </div>
                <div class="meta-item">
                    <span class="meta-label">Status</span>
                    ${parts[0] || 'Connected'}
                </div>
                <div class="meta-item">
                    <span class="meta-label">Model</span>
                    ${parts[2] || 'MiniMax-M2.5'}
                </div>
                <div class="meta-item">
                    <span class="meta-label">Tokens</span>
                    ${parts[3] || 'N/A'}
                </div>
            `;
        }

        render();
    </script>
